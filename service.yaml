apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/client-name: gcloud
    run.googleapis.com/ingress: all
  labels:
    cloud.googleapis.com/location: europe-west1
  name: myukura-careops-api
  namespace: '1001238764138'
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '5'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 40
      containers:
      - env:
        - name: APP_ENV
          value: demo
        - name: RUNTIME
          value: cloud_run
        - name: DEMO_MODE
          value: 'true'
        - name: STATE_BACKEND
          value: mongodb
        - name: GEMINI_ENABLED
          value: 'true'
        - name: OBSERVABILITY_ENABLED
          value: 'false'
        - name: DYNATRACE_ENABLED
          value: 'false'
        - name: DEMO_SYNTHETIC_DATA_ONLY
          value: 'true'
        - name: ALLOW_REAL_PATIENT_DATA
          value: 'false'
        - name: LOG_SOURCE_NOTE_CONTENT
          value: 'false'
        - name: TRACE_SOURCE_NOTE_CONTENT
          value: 'false'
        - name: MONGODB_DATABASE
          value: myukura_careops_demo
        - name: MONGODB_CONNECT_TIMEOUT_MS
          value: '5000'
        - name: MONGODB_APP_NAME
          value: myukura-careops-memory-agent
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              key: latest
              name: MYUKURA_MONGODB_URI
        - name: CORS_ALLOWED_ORIGINS
          value: https://myukura-careops-web-1001238764138.europe-west1.run.app,http://localhost:5173,http://localhost:3000
        - name: GEMINI_PRIMARY_MODEL
          value: gemini-3.5-flash
        - name: GEMINI_FALLBACK_MODELS
          value: gemini-3.1-flash-lite,gemini-3.5-pro
        - name: GEMINI_MAX_MODEL_ATTEMPTS
          value: '3'
        - name: GEMINI_REQUEST_TIMEOUT_SECONDS
          value: '20'
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: GEMINI_API_KEY
        - name: PARTNER_OUTBOX_ENABLED
          value: 'true'
        - name: ARIZE_EXPORT_ENABLED
          value: 'false'
        - name: ARIZE_MCP_ENABLED
          value: 'false'
        - name: ELASTIC_EXPORT_ENABLED
          value: 'false'
        - name: ELASTIC_MCP_ENABLED
          value: 'false'
        - name: PARTNER_MAX_ATTEMPTS
          value: '3'
        - name: PARTNER_EXPORT_TIMEOUT_SECONDS
          value: '10'
        - name: DEMO_ACCESS_REQUIRED
          value: 'true'
        - name: DEMO_ACCESS_CODE
          valueFrom:
            secretKeyRef:
              key: latest
              name: DEMO_ACCESS_CODE
        image: europe-west1-docker.pkg.dev/myukura-careops-demo/myukura-careops-repo/myukura-careops-api:latest
        ports:
        - containerPort: 8080
          name: http1
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
        startupProbe:
          failureThreshold: 1
          periodSeconds: 240
          tcpSocket:
            port: 8080
          timeoutSeconds: 240
      serviceAccountName: 1001238764138-compute@developer.gserviceaccount.com
      timeoutSeconds: 60
  traffic:
  - latestRevision: true
    percent: 100
